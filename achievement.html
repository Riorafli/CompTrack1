<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CompTrack — Achievement Reports</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="layout">
  <div id="sidebar-wrap"></div>
  <main class="main">
    <div class="topbar"><h1 class="page-title">Achievement Reports</h1></div>
    <div class="content" id="page-content"></div>
  </main>
</div>
<div id="modal-placeholder"></div>
<script src="app.js"></script>
<script>
const user = requireAuth();
if (user) {
  document.getElementById('sidebar-wrap').innerHTML = buildSidebar('achievement.html', user);
  document.getElementById('modal-placeholder').innerHTML = MODAL_HTML;
  renderPage();
}

function renderPage() {
  const userKey = getUserKey(user);
  const competitions = getCompetitions();
  const mine = user.role === 'student' ? competitions.filter(c => c.submittedBy === userKey) : competitions;
  const withAch = mine.filter(c => c.achievement);
  const pending = mine.filter(c => (c.status === 'faculty_approved') && !c.achievement);

  document.getElementById('page-content').innerHTML = `
  ${pending.length ? `
  <div class="card" style="border-color:rgba(255,181,71,.4)">
    <div class="card-title" style="color:var(--warn)">⚠️ Pending Achievement Reports (${pending.length})</div>
    ${pending.map(c => `
    <div style="display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid var(--border)">
      <div>
        <div style="font-weight:500">${c.name}</div>
        <div style="font-size:12px;color:var(--text3)">${c.dateEnd} — ${c.id}</div>
      </div>
      <button class="btn btn-warn btn-sm" onclick="openAchievementForm('${c.id}')">Report Now</button>
    </div>`).join('')}
  </div>` : ''}

  <div class="card">
    <div class="card-title">Achievement Records</div>
    ${withAch.length ? `
    <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px">
      ${withAch.map(c => `
      <div class="achievement-card" onclick="viewDetail('${c.id}',${JSON.stringify(user).replace(/"/g,'&quot;')})">
        <div style="font-size:36px;margin-bottom:12px">${c.achievement.result==='Winner'?'🥇':c.achievement.result==='Finalist'?'🎖️':'🏅'}</div>
        <div style="font-weight:600;margin-bottom:4px">${c.name}</div>
        <div style="font-size:12px;color:var(--text3);margin-bottom:8px">${c.id} · ${c.level}</div>
        <span class="status status-completed">${c.achievement.result}</span>
        <div style="margin-top:10px;font-size:12px;color:var(--text3)">
          ${c.achievement.certificate?'✅ Certificate':'❌ Certificate'} &nbsp;
          ${c.achievement.documentation?'✅ Docs':'❌ Docs'}
        </div>
        <div style="font-size:11px;color:var(--text3);margin-top:6px">Reported: ${c.achievement.reportedAt}</div>
      </div>`).join('')}
    </div>` : `
    <div class="empty-state">
      <div class="empty-icon">🏅</div>
      <div class="empty-title">No achievements recorded yet</div>
      <div class="empty-sub">Submit your post-competition reports here</div>
    </div>`}
  </div>`;
}

function openAchievementForm(id) {
  openModal('Report Achievement', `
  <p style="color:var(--text2);margin-bottom:20px">Submit your post-competition achievement report.</p>
  <div class="form-grid">
    <div class="form-group full"><label>Final Result *</label>
      <select id="ach-result"><option>Winner</option><option>Runner-up</option><option>Finalist</option><option>Participant</option></select>
    </div>
    ${buildFileUploadField('ach-cert', 'Certificate Upload')}
    ${buildFileUploadField('ach-docs', 'Documentation Upload')}
    <div class="form-group full"><label>Notes</label><textarea id="ach-notes" placeholder="Additional information..."></textarea></div>
  </div>`,
  `<button class="btn btn-ghost" onclick="closeModalDirect()">Cancel</button>
   <button class="btn btn-success" onclick="submitAchievement('${id}')">Submit Report</button>`);
}

function submitAchievement(id) {
  const result = document.getElementById('ach-result')?.value||'Participant';
  const hasCert = document.getElementById('ach-cert')?.files?.length > 0;
  const hasDocs = document.getElementById('ach-docs')?.files?.length > 0;
  const notes = document.getElementById('ach-notes')?.value?.trim()||'';
  const competitions = getCompetitions();
  const comp = competitions.find(c => c.id === id);
  if (!comp) return;
  comp.achievement = { result, certificate: hasCert, documentation: hasDocs, notes, reportedAt: new Date().toISOString().slice(0,10) };
  comp.status = 'completed';
  comp.history.push({ status:'completed', date:new Date().toISOString().slice(0,10), actor:user.name });
  saveCompetitions(competitions);
  closeModalDirect();
  toast('Achievement reported! 🎉', 'success');
  renderPage();
}
</script>
</body>
</html>
