<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CompTrack — Export Data</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="layout">
  <div id="sidebar-wrap"></div>
  <main class="main">
    <div class="topbar"><h1 class="page-title">Export Data</h1></div>
    <div class="content" id="page-content"></div>
  </main>
</div>
<script src="app.js"></script>
<script>
const user = requireAuth(['faculty','superadmin']);
if (user) {
  document.getElementById('sidebar-wrap').innerHTML = buildSidebar('export.html', user);
  const competitions = getCompetitions();
  const totalFunding = competitions.reduce((s,c) => s+c.funding, 0);

  document.getElementById('page-content').innerHTML = `
  <div class="card">
    <div class="card-title">Export Competition Data</div>
    <p style="color:var(--text2);margin-bottom:24px">Download reports in CSV or Excel format for external reporting and analysis.</p>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
      ${[
        { title:'All Submissions', desc:'Complete records of all competition submissions', icon:'📋', count: competitions.length + ' records' },
        { title:'Achievement Reports', desc:'Post-competition achievements and results', icon:'🏅', count: competitions.filter(c=>c.achievement).length + ' records' },
        { title:'Funding Summary', desc:'Budget allocations and funding requests', icon:'💰', count: 'IDR ' + (totalFunding/1e6).toFixed(0) + 'M total' },
        { title:'KPI Report', desc:'Monthly KPIs, level distributions, and statistics', icon:'📈', count: 'Monthly breakdown' },
        { title:'Exemption Letters', desc:'All generated exemption letter records', icon:'📄', count: competitions.filter(c=>c.letterGenerated).length + ' letters' },
        { title:'User Activity Log', desc:'User actions and approval history', icon:'👥', count: 'Full audit trail' },
      ].map(e => `
      <div class="stat-card blue" style="cursor:default">
        <div style="font-size:32px;margin-bottom:10px">${e.icon}</div>
        <div style="font-weight:600;font-size:15px;margin-bottom:4px">${e.title}</div>
        <div style="font-size:12px;color:var(--text2);margin-bottom:6px">${e.desc}</div>
        <div style="font-size:11px;color:var(--text3);margin-bottom:14px">${e.count}</div>
        <div style="display:flex;gap:8px">
          <button class="btn btn-ghost btn-sm" onclick="doExport('${e.title}','csv')">⬇ CSV</button>
          <button class="btn btn-primary btn-sm" onclick="doExport('${e.title}','excel')">⬇ Excel</button>
        </div>
      </div>`).join('')}
    </div>
  </div>

  <div class="card">
    <div class="card-title">Quick Preview — All Submissions</div>
    <div class="table-wrap">
      <table>
        <thead><tr><th>ID</th><th>Competition</th><th>Major</th><th>Level</th><th>Funding</th><th>Status</th></tr></thead>
        <tbody>
          ${competitions.map(c => `
          <tr>
            <td style="font-size:11px;color:var(--text3)">${c.id}</td>
            <td><div class="td-main">${c.name}</div></td>
            <td>${c.major}</td>
            <td><span class="level-badge level-${c.level}">${c.level}</span></td>
            <td>IDR ${(c.funding/1e6).toFixed(1)}M</td>
            <td><span class="status status-${c.status}">${statusLabel(c.status)}</span></td>
          </tr>`).join('')}
        </tbody>
      </table>
    </div>
    <div style="margin-top:16px;display:flex;justify-content:flex-end;gap:10px">
      <button class="btn btn-ghost" onclick="doExport('All Submissions','csv')">⬇ Export as CSV</button>
      <button class="btn btn-primary" onclick="doExport('All Submissions','excel')">⬇ Export as Excel</button>
    </div>
  </div>`;
}

function doExport(title, format) {
  const competitions = getCompetitions();
  let rows = [];
  let filename = `comptrack-${title.toLowerCase().replace(/\s/g,'-')}`;

  if (title === 'User Activity Log') {
    const log = getActivityLog();
    rows = [['Timestamp','User','Email','Role','Action','Detail']];
    if (log.length === 0) {
      toast('No activity log entries yet', 'info'); return;
    }
    log.slice().reverse().forEach(e => rows.push([
      new Date(e.timestamp).toLocaleString(),
      e.user, e.email, e.role, e.action, e.detail
    ]));
  } else if (title === 'Funding Summary') {
    rows = [['ID','Competition','Major','Level','Funding (IDR)','Status']];
    competitions.forEach(c => rows.push([c.id, c.name, c.major, c.level, c.funding, statusLabel(c.status)]));
  } else if (title === 'Achievement Reports') {
    const achieved = competitions.filter(c => c.achievement);
    rows = [['ID','Competition','Major','Level','Achievement','Organizer']];
    achieved.forEach(c => rows.push([c.id, c.name, c.major, c.level, c.achievement, c.organizer]));
  } else if (title === 'KPI Report') {
    rows = [['Major','Total Submissions','Approved','Rejected','Pending','Total Funding (IDR)']];
    const majors = [...new Set(competitions.map(c => c.major))];
    majors.forEach(m => {
      const mc = competitions.filter(c => c.major === m);
      rows.push([m, mc.length,
        mc.filter(c => c.status.includes('approved') || c.status === 'completed').length,
        mc.filter(c => c.status.includes('rejected')).length,
        mc.filter(c => c.status === 'submitted').length,
        mc.reduce((s,c) => s + c.funding, 0)
      ]);
    });
  } else if (title === 'Exemption Letters') {
    rows = [['ID','Competition','Leader NIM','Major','Date Generated','Status']];
    competitions.filter(c => c.letterGenerated).forEach(c => rows.push([
      c.id, c.name, c.leader, c.major,
      c.history.find(h => h.status === 'letter_generated')?.date || '—',
      'Generated'
    ]));
  } else {
    // All Submissions (default)
    rows = [['ID','Name','Organizer','Level','Category','Status','Funding (IDR)','Exemption Requested','Major','Submitted At']];
    competitions.forEach(c => rows.push([
      c.id, c.name, c.organizer, c.level, c.category,
      statusLabel(c.status), c.funding,
      c.exemption ? 'Yes' : 'No', c.major, c.submittedAt || '—'
    ]));
  }

  const csv = rows.map(r => r.map(v => `"${String(v).replace(/"/g,'""')}"`).join(',')).join('\n');
  const blob = new Blob([csv], { type: 'text/csv' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `${filename}.csv`;
  a.click();
  logActivity('Data Exported', `Exported "${title}" as ${format.toUpperCase()}`);
  toast(`"${title}" exported ✓`, 'success');
}
</script>
</body>
</html>
