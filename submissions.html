<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CompTrack — My Submissions</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="layout">
  <div id="sidebar-wrap"></div>
  <main class="main">
    <div class="topbar">
      <h1 class="page-title">My Submissions</h1>
      <div class="topbar-actions">
        <button class="btn btn-primary btn-sm" onclick="openSubmissionForm()">+ New Submission</button>
      </div>
    </div>
    <div class="content" id="page-content"></div>
  </main>
</div>
<div id="modal-placeholder"></div>
<script src="app.js"></script>
<script>
const user = requireAuth(['student']);
if (user) {
  document.getElementById('sidebar-wrap').innerHTML = buildSidebar('submissions.html', user);
  document.getElementById('modal-placeholder').innerHTML = MODAL_HTML;
  renderPage();
}

let membersList = [];

function renderPage() {
  const userKey = getUserKey(user);
  const competitions = getCompetitions();
  const myComps = competitions.filter(c => c.submittedBy === userKey);

  document.getElementById('page-content').innerHTML = myComps.length ? `
  <div class="filters" id="filter-row">
    ${['all','draft','submitted','pic_approved','faculty_approved','completed'].map((s,i) =>
      `<button class="filter-chip${i===0?' active':''}" onclick="applyFilter(this,'${s}')">${s==='all'?'All':statusLabel(s)}</button>`
    ).join('')}
  </div>
  <div class="card">
    <div class="table-wrap">
      <table>
        <thead><tr><th>ID</th><th>Competition</th><th>Level</th><th>Funding</th><th>Status</th><th>Exemption</th><th>Actions</th></tr></thead>
        <tbody id="sub-table">${renderRows(myComps)}</tbody>
      </table>
    </div>
  </div>` : `
  <div class="empty-state">
    <div class="empty-icon">📋</div>
    <div class="empty-title">No Submissions Yet</div>
    <div class="empty-sub">Click "+ New Submission" to get started</div>
  </div>`;
}

function renderRows(list) {
  return list.map(c => `
  <tr>
    <td style="font-size:11px;color:var(--text3)">${c.id}</td>
    <td><div class="td-main">${c.name}</div><div style="font-size:11px;color:var(--text3)">${c.organizer}</div></td>
    <td><span class="level-badge level-${c.level}">${c.level}</span></td>
    <td>IDR ${(c.funding/1e6).toFixed(1)}M</td>
    <td><span class="status status-${c.status}">${statusLabel(c.status)}</span></td>
    <td>${c.exemption?'✅':'—'}</td>
    <td style="display:flex;gap:6px;flex-wrap:wrap">
      <button class="btn btn-ghost btn-sm" onclick="viewDetail('${c.id}',${JSON.stringify(user).replace(/"/g,'&quot;')})">Detail</button>
      ${c.status==='draft'?`<button class="btn btn-primary btn-sm" onclick="submitComp('${c.id}')">Submit</button>`:''}
      ${c.status==='draft'||c.status==='pic_rejected'?`<button class="btn btn-ghost btn-sm" onclick="openSubmissionForm('${c.id}')">Edit</button>`:''}
      ${c.letterGenerated?`<button class="btn btn-accent btn-sm" onclick="downloadLetter('${c.id}')">📄 Letter</button>`:''}
      ${(c.status==='faculty_approved'||c.status==='pic_approved')&&!c.achievement?`<button class="btn btn-success btn-sm" onclick="openAchievementForm('${c.id}')">Report</button>`:''}
    </td>
  </tr>`).join('');
}

function applyFilter(el, status) {
  document.querySelectorAll('.filter-chip').forEach(e => e.classList.remove('active'));
  el.classList.add('active');
  const userKey = getUserKey(user);
  const all = getCompetitions().filter(c => c.submittedBy === userKey);
  const filtered = status === 'all' ? all : all.filter(c => c.status === status);
  document.getElementById('sub-table').innerHTML = renderRows(filtered);
}

function submitComp(id) {
  const competitions = getCompetitions();
  const comp = competitions.find(c => c.id === id);
  if (!comp) return;
  comp.status = 'submitted';
  comp.submittedAt = new Date().toISOString().slice(0,10);
  comp.history.push({ status:'submitted', date:comp.submittedAt, actor:user.name });
  saveCompetitions(competitions);
  toast(`${comp.id} submitted for PIC review`, 'success');
  renderPage();
}

function openSubmissionForm(editId) {
  const competitions = getCompetitions();
  const e = editId ? competitions.find(c => c.id === editId) : null;
  membersList = e ? [...e.members] : [];

  openModal(e ? 'Edit Submission' : 'New Competition Submission', `
  <div class="form-grid">
    <div class="form-group full"><label>Competition Name *</label><input id="f-name" value="${e?.name||''}"></div>
    <div class="form-group"><label>Organizer *</label><input id="f-org" value="${e?.organizer||''}"></div>
    <div class="form-group"><label>Level *</label>
      <select id="f-level">${['regional','national','international'].map(l=>`<option value="${l}" ${e?.level===l?'selected':''}>${l[0].toUpperCase()+l.slice(1)}</option>`).join('')}</select>
    </div>
    <div class="form-group"><label>Category</label>
      <select id="f-cat">${['Technology','Business','Research','Arts','Science','Other'].map(c=>`<option ${e?.category===c?'selected':''}>${c}</option>`).join('')}</select>
    </div>
    <div class="form-group"><label>Start Date *</label><input type="date" id="f-start" value="${e?.dateStart||''}"></div>
    <div class="form-group"><label>End Date *</label><input type="date" id="f-end" value="${e?.dateEnd||''}"></div>
    <div class="form-group full">
      <label>Team Members (NIM) *</label>
      <div style="display:flex;gap:8px">
        <input id="f-nim" placeholder="Enter NIM..." style="flex:1" type="text" inputmode="numeric" pattern="[0-9]*" oninput="this.value=this.value.replace(/[^0-9]/g,'')">
        <button class="btn btn-ghost" onclick="addMember()">Add</button>
      </div>
      <div class="member-tags" id="member-tags">${renderMemberTags()}</div>
    </div>
    <div class="form-group"><label>Team Leader NIM *</label><input id="f-leader" value="${e?.leader||user.nim||''}" type="text" inputmode="numeric" pattern="[0-9]*" oninput="this.value=this.value.replace(/[^0-9]/g,'')"></div>
    <div class="form-group"><label>Estimated Funding (IDR)</label><input type="number" id="f-funding" value="${e?.funding||''}"></div>
    <div class="form-group full"><label>Proposal Link</label><input id="f-link" placeholder="https://drive.google.com/..." value="${e?.proposalLink||''}"></div>
    <div class="form-group full"><label>Exemption Request</label>
      <select id="f-disp">
        <option value="1" ${e?.exemption?'selected':''}>Yes – Request Exemption Letter</option>
        <option value="0" ${!e?.exemption?'selected':''}>No</option>
      </select>
    </div>
    <div class="form-group full"><label>Supporting Documents</label>
      <div class="file-drop-zone" id="drop-f-docs" onclick="document.getElementById('f-docs').click()"
        ondragover="event.preventDefault();this.classList.add('drag-over')"
        ondragleave="this.classList.remove('drag-over')"
        ondrop="handleFileDrop(event,'f-docs')">
        <input type="file" id="f-docs" multiple accept=".pdf,.jpg,.jpeg,.png" style="display:none"
          onchange="handleFileSelect(this,'drop-f-docs')">
        <div class="file-drop-icon">📎</div>
        <div class="file-drop-text">Click or drag files here</div>
        <div class="file-drop-sub">PDF, JPG, PNG accepted · Multiple files allowed</div>
      </div>
      <div class="file-preview" id="preview-f-docs" style="display:none"></div>
    </div>
  </div>`,
  `<button class="btn btn-ghost" onclick="closeModalDirect()">Cancel</button>
   <button class="btn btn-ghost" onclick="saveSubmission('draft','${editId||''}')">Save as Draft</button>
   <button class="btn btn-primary" onclick="saveSubmission('submit','${editId||''}')">Submit</button>`);
}

function renderMemberTags() {
  return membersList.map(nim =>
    `<div class="member-tag">${memberName(nim)||nim} <span class="member-tag-remove" onclick="removeMember('${nim}')">×</span></div>`
  ).join('');
}

function addMember() {
  const nim = document.getElementById('f-nim').value.trim();
  if (!nim) return;
  if (!membersList.includes(nim)) { membersList.push(nim); }
  document.getElementById('f-nim').value = '';
  document.getElementById('member-tags').innerHTML = renderMemberTags();
}

function removeMember(nim) {
  membersList = membersList.filter(m => m !== nim);
  document.getElementById('member-tags').innerHTML = renderMemberTags();
}

function saveSubmission(action, existingId) {
  const name = document.getElementById('f-name')?.value?.trim();
  if (!name) { toast('Competition name is required', 'error'); return; }
  const competitions = getCompetitions();
  const date = new Date().toISOString().slice(0,10);
  const userKey = getUserKey(user);

  if (existingId) {
    const comp = competitions.find(c => c.id === existingId);
    if (comp) {
      comp.name = name;
      comp.organizer = document.getElementById('f-org').value;
      comp.level = document.getElementById('f-level').value;
      comp.category = document.getElementById('f-cat').value;
      comp.dateStart = document.getElementById('f-start').value;
      comp.dateEnd = document.getElementById('f-end').value;
      comp.members = [...membersList];
      comp.leader = document.getElementById('f-leader').value;
      comp.funding = Number(document.getElementById('f-funding').value)||0;
      comp.proposalLink = document.getElementById('f-link').value;
      comp.exemption = document.getElementById('f-disp').value === '1';
      if (action === 'submit') {
        comp.status = 'submitted'; comp.submittedAt = date;
        comp.history.push({ status:'submitted', date, actor:user.name });
      }
    }
  } else {
    const newId = 'COMP-' + new Date().getFullYear() + '-' + String(competitions.length+1).padStart(3,'0');
    competitions.push({
      id: newId, name,
      organizer: document.getElementById('f-org').value,
      level: document.getElementById('f-level').value,
      category: document.getElementById('f-cat').value,
      dateStart: document.getElementById('f-start').value,
      dateEnd: document.getElementById('f-end').value,
      members: [...membersList],
      leader: document.getElementById('f-leader').value,
      proposalLink: document.getElementById('f-link').value,
      funding: Number(document.getElementById('f-funding').value)||0,
      exemption: document.getElementById('f-disp').value === '1',
      status: action==='submit' ? 'submitted' : 'draft',
      letterGenerated: false,
      submittedAt: action==='submit' ? date : null,
      picNote:'', facultyNote:'', major: user.major||'Informatics',
      submittedBy: userKey, achievement: null,
      history: action==='submit' ? [{status:'submitted',date,actor:user.name}] : []
    });
  }
  saveCompetitions(competitions);
  closeModalDirect();
  const actionLabel = action === 'submit' ? 'Submission Submitted' : 'Draft Saved';
  const compName = name;
  logActivity(actionLabel, `${existingId ? 'Updated' : 'New'} submission: "${compName}" ${existingId ? '(' + existingId + ')' : ''}`);
  toast(action==='submit' ? 'Submission submitted! 🎉' : 'Draft saved', 'success');
  renderPage();
}

function openAchievementForm(id) {
  openModal('Report Achievement', `
  <p style="color:var(--text2);margin-bottom:20px">Submit your post-competition achievement report.</p>
  <div class="form-grid">
    <div class="form-group full"><label>Final Result *</label>
      <select id="ach-result"><option>Winner</option><option>Runner-up</option><option>Finalist</option><option>Participant</option></select>
    </div>
    ${buildFileUploadField('ach-cert', 'Certificate Upload')}
    ${buildFileUploadField('ach-docs', 'Documentation Upload')}
    <div class="form-group full"><label>Notes</label><textarea id="ach-notes" placeholder="Additional information..."></textarea></div>
  </div>`,
  `<button class="btn btn-ghost" onclick="closeModalDirect()">Cancel</button>
   <button class="btn btn-success" onclick="submitAchievement('${id}')">Submit Report</button>`);
}

function submitAchievement(id) {
  const result = document.getElementById('ach-result')?.value||'Participant';
  const hasCert = document.getElementById('ach-cert')?.files?.length > 0;
  const hasDocs = document.getElementById('ach-docs')?.files?.length > 0;
  const competitions = getCompetitions();
  const comp = competitions.find(c => c.id === id);
  if (!comp) return;
  comp.achievement = { result, certificate: hasCert, documentation: hasDocs, reportedAt: new Date().toISOString().slice(0,10) };
  comp.status = 'completed';
  comp.history.push({ status:'completed', date:new Date().toISOString().slice(0,10), actor:user.name });
  saveCompetitions(competitions);
  closeModalDirect();
  toast('Achievement reported! Status: Completed 🎉', 'success');
  renderPage();
}
</script>
</body>
</html>
