<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CompTrack — Faculty Review</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="layout">
  <div id="sidebar-wrap"></div>
  <main class="main">
    <div class="topbar">
      <h1 class="page-title">Faculty Review</h1>
      <div class="topbar-actions">
        <div class="search-bar"><input id="search-input" placeholder="Search..." oninput="renderPage()"></div>
      </div>
    </div>
    <div class="content" id="page-content"></div>
  </main>
</div>
<div id="modal-placeholder"></div>
<script src="app.js"></script>
<script>
const user = requireAuth(['faculty','superadmin']);
if (user) {
  document.getElementById('sidebar-wrap').innerHTML = buildSidebar('faculty-review.html', user);
  document.getElementById('modal-placeholder').innerHTML = MODAL_HTML;
  renderPage();
}

function renderPage() {
  const q = document.getElementById('search-input')?.value?.toLowerCase()||'';
  const competitions = getCompetitions();
  let pending = competitions.filter(c => c.status === 'pic_approved');
  if (q) pending = pending.filter(c => c.name.toLowerCase().includes(q)||c.id.toLowerCase().includes(q));

  document.getElementById('page-content').innerHTML = pending.length ? `
  <div class="card">
    <div class="card-title">PIC-Approved — Awaiting Faculty Review <span style="color:var(--accent);font-size:14px;font-family:var(--font-sans)">(${pending.length})</span></div>
    <div class="table-wrap">
      <table>
        <thead><tr><th>ID</th><th>Competition</th><th>Major</th><th>Funding</th><th>Exemption</th><th>Actions</th></tr></thead>
        <tbody>
          ${pending.map(c => `
          <tr>
            <td style="font-size:11px;color:var(--text3)">${c.id}</td>
            <td><div class="td-main">${c.name}</div><div style="font-size:11px;color:var(--text3)">${c.organizer} · <span class="level-badge level-${c.level}">${c.level}</span></div></td>
            <td>${c.major}</td>
            <td>IDR ${c.funding.toLocaleString()}</td>
            <td>${c.exemption?'<span style="color:var(--warn)">Yes — Letter Needed</span>':'No'}</td>
            <td style="display:flex;gap:6px">
              <button class="btn btn-ghost btn-sm" onclick="viewDetail('${c.id}',${JSON.stringify(user).replace(/"/g,'&quot;')})">View</button>
              <button class="btn btn-success btn-sm" onclick="doApprove('${c.id}','faculty')">Approve${c.exemption?' + Letter':''}</button>
              <button class="btn btn-danger btn-sm" onclick="openRejectModal('${c.id}','faculty')">Reject</button>
            </td>
          </tr>`).join('')}
        </tbody>
      </table>
    </div>
  </div>` : `
  <div class="empty-state">
    <div class="empty-icon">✅</div>
    <div class="empty-title">No submissions for review</div>
    <div class="empty-sub">All PIC-approved submissions have been processed</div>
  </div>`;
}
</script>
</body>
</html>
