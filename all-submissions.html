<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CompTrack — All Submissions</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="layout">
  <div id="sidebar-wrap"></div>
  <main class="main">
    <div class="topbar">
      <h1 class="page-title">All Submissions</h1>
      <div class="topbar-actions">
        <div class="search-bar"><input id="search-input" placeholder="Search competitions..." oninput="applyFilters()"></div>
      </div>
    </div>
    <div class="content" id="page-content"></div>
  </main>
</div>
<div id="modal-placeholder"></div>
<script src="app.js"></script>
<script>
const user = requireAuth(['pic','faculty','superadmin']);
if (user) {
  document.getElementById('sidebar-wrap').innerHTML = buildSidebar('all-submissions.html', user);
  document.getElementById('modal-placeholder').innerHTML = MODAL_HTML;
  renderPage();
}

let activeFilter = 'all';

function renderPage() {
  const statuses = ['all','draft','submitted','pic_approved','pic_rejected','faculty_approved','faculty_rejected','completed'];
  document.getElementById('page-content').innerHTML = `
  <div class="filters">
    ${statuses.map((s,i) =>
      `<button class="filter-chip${i===0?' active':''}" data-status="${s}" onclick="setFilter(this,'${s}')">${s==='all'?'All':statusLabel(s)}</button>`
    ).join('')}
  </div>
  <div class="card">
    <div class="table-wrap">
      <table>
        <thead><tr><th>ID</th><th>Competition</th><th>Major</th><th>Level</th><th>Funding</th><th>Status</th><th>Actions</th></tr></thead>
        <tbody id="table-body"></tbody>
      </table>
    </div>
  </div>`;
  applyFilters();
}

function setFilter(el, status) {
  document.querySelectorAll('[data-status]').forEach(e => e.classList.remove('active'));
  el.classList.add('active');
  activeFilter = status;
  applyFilters();
}

function applyFilters() {
  const q = document.getElementById('search-input')?.value?.toLowerCase()||'';
  let list = getCompetitions();
  if (activeFilter !== 'all') list = list.filter(c => c.status === activeFilter);
  if (q) list = list.filter(c => c.name.toLowerCase().includes(q)||c.id.toLowerCase().includes(q)||c.major.toLowerCase().includes(q));
  const tbody = document.getElementById('table-body');
  if (!tbody) return;
  tbody.innerHTML = list.length ? list.map(c => `
  <tr>
    <td style="font-size:11px;color:var(--text3)">${c.id}</td>
    <td><div class="td-main">${c.name}</div><div style="font-size:11px;color:var(--text3)">${c.organizer}</div></td>
    <td>${c.major}</td>
    <td><span class="level-badge level-${c.level}">${c.level}</span></td>
    <td>IDR ${(c.funding/1e6).toFixed(1)}M</td>
    <td><span class="status status-${c.status}">${statusLabel(c.status)}</span></td>
    <td><button class="btn btn-ghost btn-sm" onclick="viewDetail('${c.id}',${JSON.stringify(user).replace(/"/g,'&quot;')})">Detail</button></td>
  </tr>`).join('') : `<tr><td colspan="7" style="text-align:center;color:var(--text3);padding:40px">No submissions found</td></tr>`;
}
</script>
</body>
</html>
