<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CompTrack — Notifications</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="layout">
  <div id="sidebar-wrap"></div>
  <main class="main">
    <div class="topbar">
      <h1 class="page-title">Notifications</h1>
      <div class="topbar-actions">
        <button class="btn btn-ghost btn-sm" onclick="markAllRead()">Mark all read</button>
      </div>
    </div>
    <div class="content" id="page-content"></div>
  </main>
</div>
<script src="app.js"></script>
<script>
const user = requireAuth();
if (user) {
  document.getElementById('sidebar-wrap').innerHTML = buildSidebar('notifications.html', user);
  renderPage();
}

function renderPage() {
  const notifs = getMyNotifications(user);
  const readSet = getNotifReadSet();

  if (!notifs.length) {
    document.getElementById('page-content').innerHTML = `
    <div class="empty-state">
      <div class="empty-icon">🔔</div>
      <div class="empty-title">No notifications yet</div>
      <div class="empty-sub">Activity from submissions and approvals will appear here</div>
    </div>`;
    return;
  }

  const unread = notifs.filter(n => !readSet.has(n.id));
  const read   = notifs.filter(n =>  readSet.has(n.id));

  document.getElementById('page-content').innerHTML = `
  ${unread.length ? `
  <div class="card" style="margin-bottom:0;border-bottom-left-radius:0;border-bottom-right-radius:0;border-bottom:none">
    <div class="card-title" style="display:flex;align-items:center;gap:8px">
      Unread <span class="badge" style="position:static;transform:none">${unread.length}</span>
    </div>
    <div class="notif-list">${unread.map(n => notifRow(n, false)).join('')}</div>
  </div>` : ''}

  <div class="card" style="${unread.length ? 'border-top-left-radius:0;border-top-right-radius:0' : ''}">
    ${read.length ? `
    <div class="card-title" style="color:var(--text3)">Earlier</div>
    <div class="notif-list">${read.map(n => notifRow(n, true)).join('')}</div>
    ` : `<div style="color:var(--text3);font-size:13px;padding:8px 0">No older notifications</div>`}
  </div>`;
}

function notifRow(n, isRead) {
  return `
  <div class="notif-item${isRead ? ' notif-read' : ''}" id="notif-${n.id}" onclick="markRead('${n.id}')">
    <div class="notif-icon">${n.icon}</div>
    <div class="notif-content" style="flex:1">
      <div class="notif-title" style="${isRead ? 'color:var(--text2)' : 'color:var(--text)'}">${n.title}</div>
      <div class="notif-time">${n.time}</div>
    </div>
    ${!isRead ? '<div class="notif-dot"></div>' : ''}
    ${n.link ? `<a href="${n.link}" class="btn btn-ghost btn-sm" onclick="event.stopPropagation()">View</a>` : ''}
  </div>`;
}

function markRead(id) {
  const readSet = getNotifReadSet();
  readSet.add(id);
  saveNotifReadSet(readSet);
  renderPage();
  // Update sidebar badge live
  document.getElementById('sidebar-wrap').innerHTML = buildSidebar('notifications.html', user);
}

function markAllRead() {
  const notifs = getMyNotifications(user);
  const readSet = getNotifReadSet();
  notifs.forEach(n => readSet.add(n.id));
  saveNotifReadSet(readSet);
  renderPage();
  document.getElementById('sidebar-wrap').innerHTML = buildSidebar('notifications.html', user);
  toast('All notifications marked as read', 'info');
}
</script>
</body>
</html>
